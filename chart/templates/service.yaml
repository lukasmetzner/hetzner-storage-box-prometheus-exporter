apiVersion: v1
kind: Service
metadata:
  name: {{ include "hetzner-storage-box-prometheus-exporter.fullname" . }}
  labels:
    {{- include "hetzner-storage-box-prometheus-exporter.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 2112
      targetPort: metrics
      protocol: TCP
      name: metrics
  selector:
    {{- include "hetzner-storage-box-prometheus-exporter.selectorLabels" . | nindent 4 }}
